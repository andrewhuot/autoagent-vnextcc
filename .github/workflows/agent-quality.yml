name: Agent Quality Gate

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || echo "No requirements.txt found"

      - name: Run AutoAgent Quality Gate
        run: |
          autoagent eval run --gate --fail-on-regression --output results.json
        continue-on-error: true
        id: gate

      - name: Upload Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results
          path: results.json

      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('results.json', 'utf8'));

            const status = results.gate_passed ? '✅ PASSED' : '❌ FAILED';
            const body = `## Agent Quality Gate ${status}

            **Composite Score:** ${results.candidate_scores.composite.toFixed(4)}
            ${results.delta ? `**Delta:** ${results.delta > 0 ? '+' : ''}${results.delta.toFixed(4)}` : ''}

            ${results.failure_reasons.length > 0 ? `### Failures\n${results.failure_reasons.map(r => `- ${r}`).join('\n')}` : ''}

            <details>
            <summary>Full Results</summary>

            \`\`\`json
            ${JSON.stringify(results, null, 2)}
            \`\`\`
            </details>`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Fail if gate failed
        if: steps.gate.outcome == 'failure'
        run: exit 1
