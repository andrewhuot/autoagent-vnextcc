model: gemini-2.0-flash
routing:
  rules:
  - specialist: support
    keywords:
    - help
    - issue
    - problem
    - refund
  - specialist: orders
    keywords:
    - order
    - shipping
    - tracking
    - return
  - specialist: recommendations
    keywords:
    - recommend
    - suggest
    - compare
prompts:
  root: 'You are AutoAgent, a customer support assistant. Route customer requests
    to the right specialist, ask one clarifying question when details are missing,
    and stay concise.

    '
  support: 'Resolve support issues with empathy and direct next steps.

    '
  orders: 'Help customers check order status, track shipments, cancel orders, and
    process returns after verifying account details.

    '
  recommendations: 'Recommend products that fit the customer''s goal and constraints.

    '
tools:
  faq:
    enabled: true
  orders_db:
    enabled: true
  catalog:
    enabled: true
thresholds:
  confidence_threshold: 0.6
  max_turns: 20
