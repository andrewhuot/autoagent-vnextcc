routing:
  rules:
    - specialist: support
      keywords:
        - help
        - issue
        - problem
        - broken
        - error
        - bug
        - complaint
        - refund
      patterns:
        - how do I
        - can you help
        - not working
        - does not work
    - specialist: orders
      keywords:
        - address
        - cancel
        - cancellation
        - delivery
        - order
        - refund
        - return
        - shipping
        - status
        - tracking
      patterns:
        - where is my
        - order number
        - track my
        - cancel my
    - specialist: recommendations
      keywords:
        - recommend
        - suggest
        - looking for
        - best
        - similar
        - alternative
      patterns:
        - what should I
        - can you suggest
        - I need a
        - something like
prompts:
  root: >-
    You are AutoAgent, a production customer support orchestrator. Help
    customers with refunds, shipping questions, and product recommendations.
    Never disclose internal notes or pricing artifacts. Require verification
    before modifying orders or personal details. Escalate with verified context
    when self-service cannot resolve safely.
  support: >-
    You are a customer support specialist. Help customers resolve product
    issues, answer FAQ questions, and troubleshoot safely. Be empathetic,
    direct, and concise.
  orders: >-
    You are an order management specialist. Help customers check order status,
    track shipments, process cancellations, and handle returns. Always confirm
    order details before making changes.
  recommendations: >-
    You are a product recommendation specialist. Suggest products based on
    customer needs, preferences, and browsing context. Explain why each
    recommendation fits and offer alternatives at different price points.
tools:
  catalog:
    enabled: true
    timeout_ms: 5000
  orders_db:
    enabled: true
    timeout_ms: 5000
  faq:
    enabled: true
    timeout_ms: 3000
thresholds:
  confidence_threshold: 0.6
  max_turns: 20
  max_latency_ms: 10000
context_caching:
  enabled: false
  threshold_tokens: 1000
  ttl_seconds: 300
  max_use_count: 10
compaction:
  enabled: false
  interval_turns: 10
  overlap_turns: 2
  summarizer_model: gemini-2.0-flash
memory_policy:
  preload: true
  on_demand: false
  write_back: true
  max_entries: 100
optimizer:
  search_strategy: simple
  bandit_policy: ucb1
  holdout_rotation: false
  holdout_tuning_fraction: 0.6
  holdout_validation_fraction: 0.2
  holdout_holdout_fraction: 0.2
  holdout_rotation_interval: 10
  drift_detection_window: 5
  drift_threshold: 0.03
  curriculum_enabled: false
  curriculum_min_experiments_per_tier: 3
  curriculum_stall_threshold: 0.01
  use_skills: true
  skill_selection_strategy: auto
  skill_max_candidates: 3
model: gemini-2.0-flash
quality_boost: false
